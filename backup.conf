# =============================================================================
# 3-2-1 Backup Configuration
# Attendance & Payroll System
# =============================================================================

# Primary backup directory (local)
BACKUP_DIR="./backups"

# External backup directory - second storage media
EXTERNAL_BACKUP_DIR="/Volumes/Server1/backups/attendance-payroll"

# Offsite backup directory - third copy/offsite storage
OFFSITE_BACKUP_DIR="/Volumes/ICAN-MATERIALS/backups/attendance-payroll"

# Cloud backup settings
CLOUD_BACKUP_ENABLED=false
GITHUB_BACKUP_REPO="https://github.com/IAmKhirvie/attendance-payroll.git"

# Set true in production after EXTERNAL_BACKUP_DIR and offsite/cloud are configured.
# When true, backup fails if the external or offsite copy cannot be created.
STRICT_321=true

# Database and config paths
DATABASE_PATH="./backend/attendance_payroll.db"
ENV_FILE="./backend/.env"

# Retention policy
RETENTION_LOCAL=7
RETENTION_DAYS=30

# Compression level (1-9)
COMPRESSION_LEVEL=6
