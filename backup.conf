# =============================================================================
# 3-2-1 Backup Configuration
# Attendance & Payroll System
# =============================================================================

# Primary backup directory (local)
BACKUP_DIR="./backups"

# External backup directory - SET THIS TO AN EXTERNAL DRIVE FOR TRUE 3-2-1
# Example: EXTERNAL_BACKUP_DIR="/Volumes/MyExternalDrive/Backups/attendance-payroll"
EXTERNAL_BACKUP_DIR=""

# Cloud backup settings
CLOUD_BACKUP_ENABLED=false
GITHUB_BACKUP_REPO="https://github.com/IAmKhirvie/attendance-payroll.git"

# Set true in production after EXTERNAL_BACKUP_DIR and cloud/offsite are configured.
# When true, backup fails if the external or offsite copy cannot be created.
STRICT_321=false

# Database and config paths
DATABASE_PATH="./backend/attendance_payroll.db"
ENV_FILE="./backend/.env"

# Retention policy
RETENTION_LOCAL=7
RETENTION_DAYS=30

# Compression level (1-9)
COMPRESSION_LEVEL=6
