<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f0fdf4"/>
  <!-- Calendar -->
  <rect x="80" y="40" width="140" height="120" rx="10" fill="white" stroke="#22c55e" stroke-width="3"/>
  <rect x="80" y="40" width="140" height="30" rx="10" fill="#22c55e"/>
  <!-- Calendar header dots -->
  <circle cx="100" cy="35" r="4" fill="#16a34a"/>
  <circle cx="200" cy="35" r="4" fill="#16a34a"/>
  <!-- Days grid -->
  <g fill="#86efac">
    <rect x="95" y="85" width="20" height="20" rx="4"/>
    <rect x="120" y="85" width="20" height="20" rx="4"/>
    <rect x="145" y="85" width="20" height="20" rx="4"/>
    <rect x="170" y="85" width="20" height="20" rx="4"/>
    <rect x="95" y="110" width="20" height="20" rx="4"/>
    <rect x="120" y="110" width="20" height="20" rx="4"/>
    <rect x="145" y="110" width="20" height="20" rx="4"/>
    <rect x="170" y="110" width="20" height="20" rx="4"/>
  </g>
  <!-- Checkmark on a day -->
  <circle cx="145" cy="95" r="12" fill="#16a34a"/>
  <path d="M140 95 L143 98 L150 91" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Clock -->
  <circle cx="240" cy="100" r="35" fill="white" stroke="#22c55e" stroke-width="3"/>
  <circle cx="240" cy="100" r="3" fill="#16a34a"/>
  <line x1="240" y1="100" x2="240" y2="75" stroke="#16a34a" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="100" x2="260" y2="100" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
</svg>
